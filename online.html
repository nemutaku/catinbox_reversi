<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>箱猫リバーシ - オンライン対局</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<main class="online-screen">
  <h1 class="title-logo">ONLINE</h1>
  <p class="sub">友人とのオンライン対局を準備します。</p>

  <section class="online-panel" aria-label="オンライン対局">
    <div class="online-actions">
      <button id="createRoom" type="button">部屋を作る</button>
      <label class="room-join">
        <span>部屋IDで参加</span>
        <input id="joinCode" type="text" inputmode="latin" maxlength="6" placeholder="ABC123" autocomplete="off">
      </label>
      <button id="joinRoom" type="button" class="secondary">参加する</button>
    </div>

    <div class="room-info" aria-live="polite">
      <span>現在の部屋ID</span>
      <strong id="roomCode">------</strong>
    </div>

    <p id="onlineStatus" class="online-status">Firebase に接続しています...</p>
  </section>

  <div class="options-actions">
    <button id="modeSelectButton" type="button" class="secondary">モード選択へ戻る</button>
  </div>
</main>

<script>
  window.showOnlineScriptError = function (label) {
    const status = document.querySelector('#onlineStatus');
    if (!status) return;
    status.textContent = label + ' の読み込みに失敗しました。';
    status.classList.add('error');
  };
</script>
<script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-app-compat.js" onerror="showOnlineScriptError('Firebase app SDK')"></script>
<script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-auth-compat.js" onerror="showOnlineScriptError('Firebase auth SDK')"></script>
<script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore-compat.js" onerror="showOnlineScriptError('Firebase firestore SDK')"></script>
<script src="js/firebase-config.js?v=20260715-1"></script>
<script src="js/online.js?v=20260715-2"></script>
</body>
</html>
