<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OTHELLO - ローカル対局</title>
  <script>
    if (sessionStorage.getItem('othelloPageTransition') === '1') {
      document.documentElement.classList.add('page-entering');
      sessionStorage.removeItem('othelloPageTransition');
    }
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<main id="gameScreen">
  <div class="layout"><div class="board-column"><div class="score"><div class="count cat-score black-score"><span class="score-icons" aria-hidden="true"><img src="assets/images/blackcat_normal.png" alt=""><img src="assets/images/blackbox_normal.png" alt=""></span><b id="blackScore">2</b></div><div class="count cat-score white-score"><span class="score-icons" aria-hidden="true"><img src="assets/images/whitecat_normal.png" alt=""><img src="assets/images/whitebox_normal.png" alt=""></span><b id="whiteScore">2</b></div></div><section class="board-wrap" aria-label="オセロ盤"><div class="coord-top" aria-hidden="true"><span></span><span>A</span><span>B</span><span>C</span><span>D</span><span>E</span><span>F</span><span>G</span><span>H</span></div><div class="board-row"><div class="coord-left" aria-hidden="true"><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span></div><div id="board" role="grid" aria-label="オセロ盤"></div></div></section><div class="special-actions" aria-label="特殊ボックス"><button id="special100" class="action secondary" type="button">100%ボックス</button><button id="special0" class="action secondary" type="button">0%ボックス</button></div><div class="observe-actions"><button id="observe" class="action secondary" type="button">オープン！(残り使用回数：2回)</button></div></div><aside>
    <button id="faceToFace" class="action secondary face-toggle" type="button" aria-pressed="false">向かい合ってプレイ: OFF</button><button id="optionsButton" class="action secondary" type="button">オプション</button><button id="modeSelectButton" class="action secondary" type="button">モード選択へ戻る</button><div class="board-actions"><button id="undo" class="action secondary" disabled>待った</button><button id="newGame" class="action">新規対局</button></div>
  </aside></div>

</main>
<script src="js/othello-rules.js"></script>
<script src="js/audio.js"></script>
<script src="js/game-storage.js"></script>
<script src="js/game-view.js"></script>
<script src="js/game.js"></script>
</body>
</html>
