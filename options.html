<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>はこ×ねこリバーシ - オプション</title>
  <script>
    if (sessionStorage.getItem('othelloPageTransition') === '1') {
      document.documentElement.classList.add('page-entering');
      sessionStorage.removeItem('othelloPageTransition');
    }
  </script>
  <link rel="stylesheet" href="style.css?v=20260717-review-1">
</head>
<body>
<main class="options-screen">
  <h1 class="options-title">オプション</h1>
  <section class="options-panel" aria-label="音量設定">
    <div class="option-row">
      <div>
        <h2>BGM</h2>
        <p id="bgmValue" class="option-value">45%</p>
      </div>
      <label class="switch-label">
        <input id="bgmEnabled" type="checkbox">
        <span>BGM ON</span>
      </label>
      <input id="bgmVolume" type="range" min="0" max="100" step="1">
      <div class="bgm-choice" role="group" aria-label="対局BGM">
        <button class="action secondary bgm-choice-button" type="button" data-bgm="match-01.mp3">BGM1</button>
        <button class="action secondary bgm-choice-button" type="button" data-bgm="match-02.mp3">BGM2</button>
      </div>
    </div>
    <div class="option-row">
      <div>
        <h2>SE</h2>
        <p id="seValue" class="option-value">70%</p>
      </div>
      <label class="switch-label">
        <input id="seEnabled" type="checkbox">
        <span>SE ON</span>
      </label>
      <input id="seVolume" type="range" min="0" max="100" step="1">
      <button id="testSe" class="action secondary se-test-button" type="button">SEテスト</button>
    </div>
  </section>
  <div class="options-actions">
    <button id="backButton" class="action" type="button">戻る</button>
  </div>
</main>
<script src="js/audio.js"></script>
<script src="js/options.js"></script>
</body>
</html>
